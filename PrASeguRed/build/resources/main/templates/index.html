<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ejemplo MapBox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Incluir MapBox GL JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet" />
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script th:inline="javascript">
    /*<![CDATA[*/
    // Obtener el token de acceso suministrado en el modelo y convertirlo en literal JavaScript.
    var accessToken = [[${mapboxAccessToken}]];
    mapboxgl.accessToken = accessToken;

    // Iniciar el mapa
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v11', // estilo del mapa
        center: [-74.5, 40], // posición inicial [longitud, latitud]
        zoom: 9 // nivel de zoom inicial
    });
    /*]]>*/
</script>
</body>
</html>
